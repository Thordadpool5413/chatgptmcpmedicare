name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 145.79.4.132
          port: 65002
          username: u510071480
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          script: |
            echo "=== ENVIRONMENT ==="
            echo "HOME=$HOME"
            echo "PORT=${PORT:-not set}"
            echo "NODE_ENV=${NODE_ENV:-not set}"
            node -v 2>/dev/null || echo "node: not found"
            npm -v 2>/dev/null || echo "npm: not found"
            pm2 -v 2>/dev/null || echo "pm2: not found"
            passenger -v 2>/dev/null || echo "passenger: not found"

            echo "=== HOME DIRECTORY ==="
            ls -la ~

            echo "=== LOOKING FOR NODEJS APP DIRS ==="
            for d in ~/nodejs ~/node ~/apps ~/public_html ~/domains; do
              [ -d "$d" ] && echo "EXISTS: $d" && ls "$d" || true
            done

            echo "=== LOOKING FOR EXISTING server.js or app.js ==="
            find ~ -maxdepth 4 -name "server.js" -o -name "app.js" -o -name "index.js" 2>/dev/null | grep -v node_modules || true

            echo "=== LOOKING FOR .htaccess or passenger files ==="
            find ~ -maxdepth 4 -name ".htaccess" -o -name "passenger_node_app_root" 2>/dev/null || true

            echo "=== RUNNING PROCESSES ==="
            ps aux | grep -E "node|passenger|pm2" | grep -v grep || true

            echo "=== CLONE/UPDATE REPO ==="
            REPO="$HOME/chatgptmcpmedicare"
            if [ ! -d "$REPO/.git" ]; then
              git clone https://github.com/Thordadpool5413/chatgptmcpmedicare.git "$REPO"
            else
              cd "$REPO" && git fetch origin main && git reset --hard origin/main
            fi

            echo "=== BUILD ==="
            cd "$REPO/web" && npm install

            echo "=== DONE - check output above for directory structure ==="
