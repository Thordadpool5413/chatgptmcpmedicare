name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 145.79.4.132
          port: 65002
          username: u510071480
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          script: |
            echo "=== Connected to Hostinger ==="
            echo "Node: $(node -v 2>/dev/null || echo 'not found')"
            echo "NPM:  $(npm -v 2>/dev/null || echo 'not found')"
            echo "HOME: $HOME"
            echo "PORT: ${PORT:-not set}"
            ls ~

            # Clone or update repo
            REPO="$HOME/chatgptmcpmedicare"
            if [ ! -d "$REPO/.git" ]; then
              echo "=== Cloning repo ==="
              git clone https://github.com/Thordadpool5413/chatgptmcpmedicare.git "$REPO"
            else
              echo "=== Pulling latest ==="
              cd "$REPO"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$REPO/web"
            echo "=== Installing & building ==="
            npm install --prefer-offline 2>&1 || npm install 2>&1

            echo "=== Build complete ==="
            ls "$REPO/web/.next" && echo ".next exists"

            # Try PM2 restart first (Hostinger often uses PM2)
            pm2 restart all 2>/dev/null && echo "PM2 restarted" || echo "PM2 not available"

            echo "=== Done ==="
