name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          echo "Calling deploy webhook..."
          RESPONSE=$(curl -sf -X POST \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 15 \
            "https://u510071480.medicaremarketintelligence.thordad.com/api/deploy" \
            2>&1) || true
          echo "Response: $RESPONSE"
          echo "Deploy triggered — build runs on the server in the background."
